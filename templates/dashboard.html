<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CreditCardDashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fc;
font-family:Arial;
}

.card{
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,.15);
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center text-primary mb-5">
📊 Credit Dashboard
</h1>

<div class="row">

<div class="col-md-4">

<div class="card p-4 text-center">

<h3>Total Predictions</h3>

<h1>{{ total }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h3>Approved</h3>

<h1 class="text-success">{{ approved }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h3>Rejected</h3>

<h1 class="text-danger">{{ rejected }}</h1>

</div>

</div>

</div>

<hr class="my-5">

<div class="card p-4">

<h3>Prediction History</h3>

<table class="table table-bordered">

    <tr>
        <th>Name</th>
        <th>Result</th>
        <th>Confidence</th>
        <th>Risk</th>
    </tr>

    {% for item in history %}

    <tr>
        <td>{{ item.name }}</td>
        <td>{{ item.result }}</td>
        <td>{{ item.confidence }}</td>
        <td>{{ item.risk }}</td>
    </tr>

    {% endfor %}

</table>

</div>

<div class="text-center mt-4">

<a href="/predict-page" class="btn btn-primary btn-lg">
New Prediction
</a>

<a href="/" class="btn btn-success btn-lg">
Home
</a>

</div>

</div>

</body>
</html>
