<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credit Card Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
    font-family:Arial, Helvetica, sans-serif;
}

.navbar{
    background:linear-gradient(90deg,#0d6efd,#2563eb);
}

.form-box{
    background:white;
    border-radius:20px;
    padding:40px;
    margin-top:40px;
    margin-bottom:40px;
    box-shadow:0px 5px 20px rgba(0,0,0,.1);
}

.section-title{
    color:#0d6efd;
    font-weight:bold;
    margin-top:25px;
    margin-bottom:20px;
}

.btn-primary{
    padding:12px 40px;
    border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">💳 Credit Card</a>

</div>

</nav>

<div class="container">

<div class="form-box">

<h2 class="text-center mb-4">
Credit Card Application Form
</h2>

<form action="/predict" method="POST">

<!-- PERSONAL DETAILS -->

<h4 class="section-title">
Personal Information
</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" class="form-control" name="name" required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control" name="email" required>
</div>

<div class="col-md-6 mb-3">
    <label>Phone Number</label>
    <input type="tel"
           class="form-control"
           name="phone"
           placeholder=""
           pattern="[0-9]{10}"
           required>
</div>

<div class="col-md-4 mb-3">
<label>Gender</label>

<select class="form-select" name="gender">

<option value="M">Male</option>

<option value="F">Female</option>

</select>

</div>

<div class="col-md-4 mb-3">
    <label>Own Car</label>
    <select class="form-select" name="own_car">
        <option value="Y">Yes</option>
        <option value="N">No</option>
    </select>
</div>

<div class="col-md-4 mb-3">
    <label>Own House</label>
    <select class="form-select" name="own_realty">
        <option value="Y">Yes</option>
        <option value="N">No</option>
    </select>
</div>

<div class="col-md-4 mb-3">
<label>Age</label>
<input type="number" class="form-control" name="age">
</div>

<div class="col-md-4 mb-3">
<label>Children</label>
<input type="number" class="form-control" name="children">
</div>

</div>

<!-- EMPLOYMENT -->

<h4 class="section-title">
Employment Details
</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label>Annual Income</label>

<input type="number"
class="form-control"
name="income">

</div>

<div class="col-md-6 mb-3">

<label>Income Type</label>

<select class="form-select" name="income_type">

<option value="Working">Working</option>

<option value="Commercial associate">Commercial associate</option>

<option value="Pensioner">Pensioner</option>

<option value="State servant">State servant</option>

<option value="Student">Student</option>

</select>

</div>

<div class="col-md-6 mb-3">

<select class="form-select" name="occupation">
<option value="Accountants">Accountants</option>
<option value="Cleaning staff">Cleaning staff</option>
<option value="Cooking staff">Cooking staff</option>
<option value="Core staff">Core staff</option>
<option value="Drivers">Drivers</option>
<option value="HR staff">HR staff</option>
<option value="High skill tech staff">High skill tech staff</option>
<option value="IT staff">IT staff</option>
<option value="Laborers">Laborers</option>
<option value="Low-skill Laborers">Low-skill Laborers</option>
<option value="Managers">Managers</option>
<option value="Medicine staff">Medicine staff</option>
<option value="Private service staff">Private service staff</option>
<option value="Realty agents">Realty agents</option>
<option value="Sales staff">Sales staff</option>
<option value="Secretaries">Secretaries</option>
<option value="Security staff">Security staff</option>
<option value="Unknown">Unknown</option>
<option value="Waiters/barmen staff">Waiters/barmen staff</option>

</select>

<div class="col-md-6 mb-3">

<label>Employment Days</label>

<input
type="number"
class="form-control"
name="employment_days" required>

</div>

</div>

<!-- EDUCATION -->

<h4 class="section-title">
Education
</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label>Education Type</label>

<select class="form-select" name="education">

<option value="Secondary / secondary special">Secondary / secondary special</option>

<option value="Higher education">Higher education</option>

<option value="Incomplete higher">Incomplete higher</option>

<option value="Academic degree">Academic degree</option>

<option value="Lower secondary">Lower secondary</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Family Status</label>

<select class="form-select" name="family_status">

<option value="Single / not married">Single / not married</option>

<option value="Married">Married</option>

<option value="Civil marriage">Civil marriage</option>

<option value="Widow">Widow</option>

<option value="Separated">Separated</option>

</select>

</div>

</div>

<!-- HOUSING -->

<h4 class="section-title">
Housing Information
</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label>Housing Type</label>

<select class="form-select" name="housing">

<option value="House / apartment">House / apartment</option>

<option value="Rented apartment">Rented apartment</option>

<option value="With parents">With parents</option>

<option value="Municipal apartment">Municipal apartment</option>

<option value="Office apartment">Office apartment</option>

<option value="Co-op apartment">Co-op apartment</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Family Members</label>

<input
type="number"
class="form-control"
name="family_members">

</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">
<label>Months Balance</label>
<input type="number" class="form-control" name="months_balance">
</div>

<div class="col-md-4 mb-3">
<label>Payment Status</label>
<select class="form-select" name="payment_status">
<option>Paid</option>
<option>Late</option>
<option>Overdue</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Overdue Status</label>
<select class="form-select" name="overdue_status">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Has Work Phone</label>
<select class="form-select" name="work_phone">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Has Phone</label>
<select class="form-select" name="phone_flag">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Has Email</label>
<select class="form-select" name="email_flag">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-primary btn-lg">

Predict Approval

</button>

</div>

</form>

</div>

</div>

</body>
</html>
